<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeShare | View Reviews</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .review-card {
            transition: all 0.3s ease;
            transform-origin: center;
        }
        .review-card:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .gradient-text {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body class="min-h-screen">
<nav class="bg-white shadow-md">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <a href="index.html" class="text-2xl font-bold gradient-text">BikeShare</a>
        <div class="space-x-6">
            <a href="submit-review.html" class="text-gray-700 font-medium hover:text-indigo-600">Submit Review</a>
            <a href="view-reviews.html" class="text-gray-700 font-medium hover:text-indigo-600">View Reviews</a>
            <a href="index.html" class="text-gray-700 font-medium hover:text-indigo-600">Feedback Portal</a>
        </div>
    </div>
</nav>

<div class="container mx-auto px-4 py-8 max-w-6xl">
    <div class="fixed top-20 left-10 w-16 h-16 rounded-full bg-indigo-100 opacity-50 animate-float"></div>
    <div class="fixed bottom-1/4 right-20 w-24 h-24 rounded-full bg-purple-100 opacity-50 animate-float" style="animation-delay: 2s;"></div>

    <header class="mb-12 text-center">
        <h1 class="text-4xl font-bold gradient-text mb-2">BikeShare</h1>
        <h2 class="text-3xl font-semibold text-gray-800">View Reviews</h2>
        <p class="text-gray-500 max-w-2xl mx-auto mt-3">See what others are saying about our service</p>
    </header>

    <div class="space-y-4" id="reviewsContainer"></div>

    <div class="text-center mt-6">
        <button id="loadMore" class="px-5 py-2.5 text-sm font-medium text-indigo-600 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition-colors duration-200">
            Load More Reviews
        </button>
    </div>
</div>

<div id="editModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="glass-card rounded-2xl p-6 w-full max-w-md transform transition-all duration-300 scale-95 opacity-0" id="modalContent">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-semibold text-gray-800">Edit Your Review</h3>
            <button id="closeModal" class="text-gray-500 hover:text-gray-700 transition-colors duration-200">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <form id="editReviewForm" class="space-y-4">
            <input type="hidden" id="editReviewId">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Your Rating</label>
                <div class="flex justify-between">
                    <button type="button" class="edit-star-rating text-2xl text-gray-300 transition-colors duration-200" data-rating="1">★</button>
                    <button type="button" class="edit-star-rating text-2xl text-gray-300 transition-colors duration-200" data-rating="2">★</button>
                    <button type="button" class="edit-star-rating text-2xl text-gray-300 transition-colors duration-200" data-rating="3">★</button>
                    <button type="button" class="edit-star-rating text-2xl text-gray-300 transition-colors duration-200" data-rating="4">★</button>
                    <button type="button" class="edit-star-rating text-2xl text-gray-300 transition-colors duration-200" data-rating="5">★</button>
                </div>
                <input type="hidden" id="editRatingValue" name="rating" value="0">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Your Review</label>
                <textarea id="editReviewText" rows="4" class="w-full px-4 py-2 border-0 bg-gray-100 rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm"></textarea>
            </div>
            <div class="flex justify-end space-x-3 pt-2">
                <button type="button" id="cancelEdit" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors duration-200">
                    Cancel
                </button>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors duration-200 shadow-md">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>

<div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="glass-card rounded-2xl p-6 w-full max-w-md transform transition-all duration-300 scale-95 opacity-0" id="deleteModalContent">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xl font-semibold text-gray-800">Delete Review</h3>
            <button id="closeDeleteModal" class="text-gray-500 hover:text-gray-700 transition-colors duration-200">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <p class="mb-6 text-gray-700">Are you sure you want to delete this review? This action cannot be undone.</p>
        <div class="flex justify-end space-x-3">
            <button type="button" id="cancelDelete" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors duration-200">
                Cancel
            </button>
            <button type="button" id="confirmDelete" class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-lg hover:bg-red-700 transition-colors duration-200 shadow-md">
                Delete Review
            </button>
        </div>
    </div>
</div>

<script>
    const reviewsContainer = document.getElementById('reviewsContainer');
    const editModal = document.getElementById('editModal');
    const deleteModal = document.getElementById('deleteModal');
    const modalContent = document.getElementById('modalContent');
    const deleteModalContent = document.getElementById('deleteModalContent');

    function showModal(modal, contentElement) {
        modal.classList.remove('hidden');
        setTimeout(() => {
            contentElement.classList.remove('scale-95', 'opacity-0');
            contentElement.classList.add('scale-100', 'opacity-100');
        }, 10);
    }

    function hideModal(modal, contentElement) {
        contentElement.classList.remove('scale-100', 'opacity-100');
        contentElement.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300);
    }

    function showNotification(message, type) {
        const notification = document.createElement('div');
        notification.className = `fixed top-5 right-5 px-6 py-3 rounded-lg shadow-lg text-white font-medium transform transition-all duration-300 translate-x-64 ${
            type === 'success' ? 'bg-green-500' : 'bg-red-500'
        }`;
        notification.textContent = message;
        document.body.appendChild(notification);
        setTimeout(() => {
            notification.classList.remove('translate-x-64');
        }, 10);
        setTimeout(() => {
            notification.classList.add('translate-x-64');
            setTimeout(() => {
                notification.remove();
            }, 300);
        }, 3000);
    }

    async function fetchReviews() {
        try {
            const response = await fetch('http://localhost:8080/api/reviews');
            const reviews = await response.json();
            reviewsContainer.innerHTML = '';
            reviews.forEach(review => {
                const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
                const reviewCard = `
                        <div class="review-card glass-card rounded-2xl p-6" data-id="${review.reviewId}">
                            <div class="flex justify-between">
                                <div>
                                    <h4 class="font-semibold text-gray-800">User ${review.reviewId}</h4>
                                    <p class="text-xs text-gray-500 mt-1">${new Date().toLocaleDateString()}</p>
                                </div>
                                <div class="flex items-center">
                                    <div class="text-yellow-400 text-lg mr-1">${stars}</div>
                                    <span class="text-sm font-medium text-gray-700">${review.rating}.0</span>
                                </div>
                            </div>
                            <p class="mt-3 text-gray-700 text-sm leading-relaxed">${review.text}</p>
                            <div class="mt-4 flex justify-end space-x-3">
                                <button class="edit-review text-xs font-medium px-3 py-1.5 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 transition-colors duration-200" data-id="${review.reviewId}">
                                    <i class="fas fa-pen mr-1"></i> Edit
                                </button>
                                <button class="delete-review text-xs font-medium px-3 py-1.5 rounded-lg bg-red-50 hover:bg-red-100 text-red-600 transition-colors duration-200" data-id="${review.reviewId}">
                                    <i class="fas fa-trash mr-1"></i> Delete
                                </button>
                            </div>
                        </div>`;
                reviewsContainer.insertAdjacentHTML('beforeend', reviewCard);
            });

            document.querySelectorAll('.edit-review').forEach(button => {
                button.addEventListener('click', () => {
                    const reviewId = button.getAttribute('data-id');
                    const review = reviews.find(r => r.reviewId == reviewId);
                    document.getElementById('editReviewId').value = reviewId;
                    document.getElementById('editRatingValue').value = review.rating;
                    document.getElementById('editReviewText').value = review.text;

                    const editStarRatings = document.querySelectorAll('.edit-star-rating');
                    editStarRatings.forEach((star, index) => {
                        if (index < review.rating) {
                            star.classList.add('text-yellow-400');
                            star.classList.remove('text-gray-300');
                        } else {
                            star.classList.add('text-gray-300');
                            star.classList.remove('text-yellow-400');
                        }
                    });

                    showModal(editModal, modalContent);
                });
            });

            document.querySelectorAll('.delete-review').forEach(button => {
                button.addEventListener('click', () => {
                    document.getElementById('confirmDelete').setAttribute('data-id', button.getAttribute('data-id'));
                    showModal(deleteModal, deleteModalContent);
                });
            });
        } catch (error) {
            showNotification('Error fetching reviews.', 'error');
        }
    }

    const editStarRatings = document.querySelectorAll('.edit-star-rating');
    const editRatingValue = document.getElementById('editRatingValue');
    editStarRatings.forEach(star => {
        star.addEventListener('click', () => {
            const rating = parseInt(star.getAttribute('data-rating'));
            editRatingValue.value = rating;
            editStarRatings.forEach((s, index) => {
                if (index < rating) {
                    s.classList.add('text-yellow-400');
                    s.classList.remove('text-gray-300');
                } else {
                    s.classList.add('text-gray-300');
                    s.classList.remove('text-yellow-400');
                }
            });
        });
    });

    document.getElementById('editReviewForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const reviewId = document.getElementById('editReviewId').value;
        const newRating = document.getElementById('editRatingValue').value;
        const newText = document.getElementById('editReviewText').value;

        try {
            const response = await fetch(`http://localhost:8080/api/reviews/${reviewId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `rating=${newRating}&text=${encodeURIComponent(newText)}`
            });
            if (response.ok) {
                hideModal(editModal, modalContent);
                showNotification('Review updated successfully!', 'success');
                fetchReviews();
            } else {
                showNotification('Failed to update review.', 'error');
            }
        } catch (error) {
            showNotification('Error updating review.', 'error');
        }
    });

    document.getElementById('confirmDelete').addEventListener('click', async () => {
        const reviewId = document.getElementById('confirmDelete').getAttribute('data-id');
        try {
            const response = await fetch(`http://localhost:8080/api/reviews/${reviewId}`, {
                method: 'DELETE'
            });
            if (response.ok) {
                hideModal(deleteModal, deleteModalContent);
                showNotification('Review deleted successfully!', 'success');
                fetchReviews();
            } else {
                showNotification('Failed to delete review.', 'error');
            }
        } catch (error) {
            showNotification('Error deleting review.', 'error');
        }
    });

    document.getElementById('closeModal').addEventListener('click', () => hideModal(editModal, modalContent));
    document.getElementById('cancelEdit').addEventListener('click', () => hideModal(editModal, modalContent));
    document.getElementById('closeDeleteModal').addEventListener('click', () => hideModal(deleteModal, deleteModalContent));
    document.getElementById('cancelDelete').addEventListener('click', () => hideModal(deleteModal, deleteModalContent));

    fetchReviews();
</script>
</body>
</html>
